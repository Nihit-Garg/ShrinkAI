version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on: []

volumes:
  chroma_data:
